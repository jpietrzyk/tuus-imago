<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.1.11/dist/decap-cms.js"></script>
    <script>
      var MenuOrderControl = createClass({
        getInitialState: function () {
          return { value: this.props.value || 1 };
        },
        componentWillReceiveProps: function (np) {
          if (np.value !== this.props.value) this.setState({ value: np.value || 1 });
        },
        handleChange: function (e) {
          var raw = e.target.value === '' ? '' : parseInt(e.target.value, 10);
          if (isNaN(raw)) return;
          var min = this.props.field.get('min') || 1;
          var max = this.props.field.get('max') || 50;
          var v = Math.min(Math.max(raw, min), max);
          this.setState({ value: v });
          this.props.onChange(v);
        },
        step: function (delta) {
          var min = this.props.field.get('min') || 1;
          var max = this.props.field.get('max') || 50;
          var v = Math.min(Math.max((this.state.value || 1) + delta, min), max);
          this.setState({ value: v });
          this.props.onChange(v);
        },
        render: function () {
          return h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
            h('button', {
              type: 'button',
              style: { width: '32px', height: '32px', fontSize: '18px', cursor: 'pointer', border: '1px solid #ccc', borderRadius: '4px', background: '#f5f5f5' },
              onClick: this.step.bind(this, -1)
            }, '\u2212'),
            h('input', {
              id: this.props.forID,
              className: this.props.classNameWrapper,
              type: 'number',
              value: this.state.value,
              min: this.props.field.get('min') || 1,
              max: this.props.field.get('max') || 50,
              onChange: this.handleChange,
              style: { width: '64px', textAlign: 'center', fontSize: '14px', padding: '4px', border: '1px solid #ccc', borderRadius: '4px' }
            }),
            h('button', {
              type: 'button',
              style: { width: '32px', height: '32px', fontSize: '18px', cursor: 'pointer', border: '1px solid #ccc', borderRadius: '4px', background: '#f5f5f5' },
              onClick: this.step.bind(this, 1)
            }, '+')
          );
        }
      });

      CMS.registerWidget('menuOrder', MenuOrderControl);
    </script>
  </body>
</html>
