local_backend: false
backend:
  name: git-gateway
  branch: main
locale: pl
media_folder: content/media
public_folder: /content/media
collections:
  - name: legal
    label: Strony informacyjne
    folder: content/legal
    create: false
    extension: md
    format: frontmatter
    summary: "{{title}} (/{{slug}})"
    fields:
      - name: title
        label: Tytuł
        widget: string
      - name: subtitle
        label: Podtytuł
        widget: string
      - name: icon
        label: Ikona menu
        widget: select
        options:
          - FileText
          - Shield
          - Cookie
          - CheckCircle
          - Lock
          - RotateCcw
          - Truck
          - AlertCircle
          - BadgeDollarSign
          - Building2
          - Mail
      - name: menuSection
        label: Sekcja menu
        widget: select
        options:
          - legal
          - payments
          - company
        hint: "Grupa w menu — strony są porządkowane osobno w każdej sekcji."
      - name: menuOrder
        label: Kolejność w menu
        widget: menuOrder
        value_type: int
        min: 1
        max: 50
        hint: "Niższa liczba = wyżej w menu. Strony są sortowane rosnąco w obrębie sekcji."
      - name: lastUpdated
        label: Ostatnia aktualizacja
        widget: datetime
        format: YYYY-MM-DD
        date_format: DD.MM.YYYY
      - name: lang
        label: Język
        widget: hidden
        default: pl
      - name: body
        label: Treść
        widget: markdown
        hint: Treść strony w formacie Markdown
